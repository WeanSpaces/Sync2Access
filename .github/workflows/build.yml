name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  extension:
    name: Extension Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: access-url-rebuilt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: access-url-rebuilt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sync2access-extension-dist
          path: access-url-rebuilt/dist
