<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout Confirmation - Sync2Access</title>
  <style>
    :root {
      --radius: 0.625rem;
      --background: oklch(1 0 0);
      --foreground: oklch(0.145 0 0);
      --card: oklch(1 0 0);
      --card-foreground: oklch(0.145 0 0);
      --muted: oklch(0.97 0 0);
      --muted-foreground: oklch(0.556 0 0);
      --accent: oklch(0.97 0 0);
      --accent-foreground: oklch(0.205 0 0);
      --border: oklch(0.922 0 0);
      --ring: oklch(0.708 0 0);
      --destructive: oklch(0.577 0.245 27.325);
      --success: oklch(0.527 0.154 150.069);
    }
    .dark {
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --card: oklch(0.205 0 0);
      --card-foreground: oklch(0.985 0 0);
      --muted: oklch(0.269 0 0);
      --muted-foreground: oklch(0.708 0 0);
      --accent: oklch(0.269 0 0);
      --accent-foreground: oklch(0.985 0 0);
      --border: oklch(1 0 0 / 10%);
      --ring: oklch(0.556 0 0);
      --destructive: oklch(0.704 0.191 22.216);
      --success: oklch(0.648 0.2 142);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--background); color: var(--foreground);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    .container {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px; max-width: 420px; width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }
    .dark .container { box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 20px; background: var(--accent);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; stroke: #f59e0b; }
    h1 { font-size: 22px; color: var(--foreground); margin-bottom: 12px; font-weight: 600; }
    .domain { font-size: 14px; color: var(--muted-foreground); margin-bottom: 24px; }
    .domain strong { color: var(--foreground); }
    .buttons { display: flex; gap: 12px; justify-content: center; }
    button {
      padding: 10px 20px; border: none; border-radius: var(--radius);
      font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s ease;
      display: inline-flex; align-items: center; justify-content: center;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
    .btn-logout { background: var(--destructive); color: white; }
    .btn-stay { background: var(--success); color: white; }
    .btn-not-logout {
      margin-top: 12px; width: 100%; padding: 8px 16px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--muted-foreground); font-size: 12px; cursor: pointer;
    }
    .btn-not-logout:hover { background: var(--accent); color: var(--foreground); }
    .info {
      margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--muted-foreground);
    }
    .loading { display: none; margin-top: 20px; }
    .loading.show { display: block; }
    .spinner {
      width: 24px; height: 24px; border: 3px solid var(--border);
      border-top-color: var(--foreground); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .keyboard-hint { margin-top: 16px; font-size: 12px; color: var(--muted-foreground); }
    kbd {
      display: inline-block; padding: 2px 6px; font-size: 11px; font-family: monospace;
      background: var(--accent); border: 1px solid var(--border); border-radius: 4px; margin: 0 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <h1 id="title">Are you trying to logout?</h1>
    <p class="domain"><span id="description">You're navigating to a logout page on</span> <strong id="domain">this site</strong></p>
    <div class="buttons">
      <button class="btn-logout" id="btn-logout">Yes, logout</button>
      <button class="btn-stay" id="btn-stay">No, stay logged in</button>
    </div>
    <button class="btn-not-logout" id="btn-not-logout">This is not a logout page</button>
    <div class="loading" id="loading"><div class="spinner"></div></div>
    <p class="keyboard-hint"><span id="keyboard-hint">Press</span> <kbd>Esc</kbd> <span id="to-stay">to stay logged in</span></p>
    <p class="info" id="protected-by">Protected by Sync2Access</p>
  </div>
  <script type="module" src="./src/pages/logout-confirm/logout-confirm.ts"></script>
</body>
</html>
